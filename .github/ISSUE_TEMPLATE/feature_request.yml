name: Feature Request
description: Got an idea?
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What do you want?
      placeholder: Describe the feature. Keep it short.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      placeholder: What problem does this solve?
