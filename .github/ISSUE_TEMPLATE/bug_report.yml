name: Bug Report
description: Something's broken
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce it
      placeholder: Code or steps that trigger the bug.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Lightpack Version
      placeholder: e.g., 0.9.0
