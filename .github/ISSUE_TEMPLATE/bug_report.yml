name: Bug Report
description: Report a bug in Lightpack Framework
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the information below so we can help you quickly.

  - type: input
    id: version
    attributes:
      label: Lightpack Version
      description: What version of Lightpack are you running?
      placeholder: e.g., 0.9.0-alpha
    validations:
      required: true

  - type: input
    id: php_version
    attributes:
      label: PHP Version
      description: What version of PHP are you using?
      placeholder: e.g., 8.2.15
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the exact steps to reproduce the bug. If possible, include a minimal code example.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe expected behavior...

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe actual behavior...

  - type: textarea
    id: logs
    attributes:
      label: Error Logs or Stack Traces
      description: If applicable, paste error logs or stack traces. Use triple backticks to format code.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](../CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
